name: Release

on:
  push:
    tags:
      - "v*"
      - "[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build static release binary
        run: |
          mkdir -p dist
          LDFLAGS="$(./scripts/ldflags.sh)"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "$LDFLAGS" -o dist/pbs-exporter-linux-amd64 .
          ./scripts/verify-buildinfo.sh dist/pbs-exporter-linux-amd64

      - name: Prepare release assets
        run: |
          cp packaging/systemd/pbs-exporter.service dist/
          cp packaging/examples/config.yml dist/pbs-exporter-config.yml
          cp packaging/examples/web-config.yml dist/pbs-exporter-web-config.yml
          cp packaging/grafana/pbs-exporter-dashboard.json dist/

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pbs-exporter-linux-amd64
            dist/pbs-exporter.service
            dist/pbs-exporter-config.yml
            dist/pbs-exporter-web-config.yml
            dist/pbs-exporter-dashboard.json
          generate_release_notes: true
